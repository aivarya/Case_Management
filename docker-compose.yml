version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: casemgmt
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:secret@db:5432/casemgmt
      SESSION_SECRET: change-this-in-production
      PORT: 3001
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "2026:80"
    depends_on:
      - backend

volumes:
  pgdata:
